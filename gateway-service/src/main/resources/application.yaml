spring:
  application:
    name: gateway-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/quickbite
  # ============================================
  # REDIS (pour le rate limiting)
  # ============================================
  data:
    redis:
      host: localhost
      port: 6379

  # ============================================
  # SPRING CLOUD GATEWAY - ROUTES
  # ============================================
  cloud:
    gateway:
      server:
        webflux:
          # ---------- CORS global ----------
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "http://localhost:3000"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowed-headers: "*"
                allow-credentials: true

          # ---------- ROUTES ----------
          routes:

            # --- User Service ---
            - id: user-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/users/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"

            # --- Restaurant Service ---
            - id: restaurant-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/restaurants/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"

            # --- Order Service ---
            - id: order-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/orders/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"

            # --- Payment Service ---
            - id: payment-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/payments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"

            # --- Delivery Service ---
            - id: delivery-service
              uri: http://localhost:8088
              predicates:
                - Path=/api/deliveries/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"

            # --- Notification Service ---
            - id: notification-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/notifications/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"

          # ---------- Route par defaut ----------
          default-filters:
            - name: AddResponseHeader
              args:
                name: X-Gateway
                value: QuickBite-Gateway

# ============================================
# PORT DU GATEWAY
# ============================================
server:
  port: 8080

# ============================================
# ACTUATOR
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

# ============================================
# LOGGING
# ============================================
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route.RouteDefinitionLocator: INFO

