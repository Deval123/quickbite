spring:
  application:
    name: order-service

    # ============================================
    # DATASOURCE - PostgreSQL (BDD isolee)
    # ============================================
  datasource:
    url: jdbc:postgresql://localhost:5434/quickbite-order
    username: quickbite
    password: quickbite
    driver-class-name: org.postgresql.Driver

    # ============================================
    # JPA / Hibernate
    # ============================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "com.quickbite.*"

  # ============================================
  # OAUTH2 - JWT verification (Resource Server)
  # ============================================
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/quickbite
          # Spring telecharge auto la cle publique depuis:
          # http://localhost:8180/realms/quickbite/protocol/openid-connect/certs

      # ============================================
      # OAUTH2 - Client Credentials (Service-to-Service)
      # ============================================
      client:
        registration:
          keycloak-service:
            provider: keycloak
            client-id: order-svc
            client-secret: order-svc-secret
            authorization-grant-type: client_credentials
            scope: menu.read
        provider:
          keycloak:
            token-uri: http://localhost:8180/realms/quickbite/protocol/openid-connect/token

      # ============================================
      # FLYWAY
      # ============================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health, info